<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Subtle gradient for a modern, premium feel -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" /> <!-- sky-500 -->
      <stop offset="100%" stop-color="#38bdf8" /> <!-- sky-400 -->
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer HUD / scanning scope ring (observability/radar) -->
  <circle cx="50" cy="50" r="41" stroke="url(#skyGrad)" stroke-width="5.5" fill="none" />
  
  <!-- Inner secondary radar dashes -->
  <circle cx="50" cy="50" r="33" stroke="url(#skyGrad)" stroke-width="1.5" fill="none" stroke-opacity="0.35" stroke-dasharray="4 8" />

  <!-- The Greek Letter Pi (π) in the center -->
  <!-- Main horizontal bar -->
  <path d="M 32 36 L 68 36" stroke="url(#skyGrad)" stroke-width="6.5" stroke-linecap="round" />
  
  <!-- Left Leg curving slightly left at bottom -->
  <path d="M 42 36 L 42 61 C 42 63.5 39 65.5 35 65.5" stroke="url(#skyGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Right Leg curving right at bottom (hook) -->
  <path d="M 58 36 L 58 57 C 58 62 60.5 64.5 65 64.5" stroke="url(#skyGrad)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Telemetry pulse ping / agent status light -->
  <circle cx="50" cy="18" r="4" fill="url(#skyGrad)" filter="url(#glow)" />
</svg>
