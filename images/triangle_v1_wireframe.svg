<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Arial, Helvetica, sans-serif">
  <title>Trade-Off Triangle — Wireframe</title>
  <defs>
    <filter id="glow1" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow1" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <style>
    .edge {
      fill: none;
      stroke: #22D3EE;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .glowedge {
      fill: none;
      stroke: #00E5FF;
      stroke-width: 11;
      stroke-linecap: round;
      opacity: 0.3;
    }
    .node {
      fill: #06121a;
      stroke: #00E5FF;
      stroke-width: 5;
    }
    .nodecore { fill: #aef6ff; }
    .label {
      fill: #FFFFFF;
      font-weight: 700;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(3,12,20,0.95);
      stroke-width: 6;
      stroke-linejoin: round;
    }
    .label-glow {
      fill: #00E5FF;
      font-weight: 700;
      text-anchor: middle;
      opacity: 0.5;
    }
    .title { font-size: 78px; letter-spacing: 6px; }
    .vlabel { font-size: 46px; letter-spacing: 3px; }

    .fadeTitle { opacity: 0; animation: fadeIn 0.35s ease-out 0s forwards; }
    .draw1 { stroke-dasharray: 710; stroke-dashoffset: 710; animation: draw 1.3s ease-in-out 0.3s forwards; }
    .draw2 { stroke-dasharray: 800; stroke-dashoffset: 800; animation: draw 1.3s ease-in-out 2.2s forwards; }
    .draw3 { stroke-dasharray: 710; stroke-dashoffset: 710; animation: draw 1.3s ease-in-out 4.1s forwards; }
    .fadePerf { opacity: 0; animation: fadeIn 0.5s ease-out 1.6s forwards; }
    .fadeSpeed { opacity: 0; animation: fadeIn 0.5s ease-out 3.5s forwards; }
    .fadeCost { opacity: 0; animation: fadeIn 0.5s ease-out 5.4s forwards; }
    .nodeApex { opacity: 0; transform-box: fill-box; transform-origin: center; animation: pop 0.45s cubic-bezier(.2,1.4,.4,1) 1.7s forwards; }
    .nodeLeft { opacity: 0; transform-box: fill-box; transform-origin: center; animation: pop 0.45s cubic-bezier(.2,1.4,.4,1) 3.6s forwards; }
    .nodeRight { opacity: 0; transform-box: fill-box; transform-origin: center; animation: pop 0.45s cubic-bezier(.2,1.4,.4,1) 5.5s forwards; }
    .pulse { animation: pulse 3.4s ease-in-out 6.2s infinite; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes pop {
      0% { opacity: 0; transform: scale(0.3); }
      70% { opacity: 1; transform: scale(1.18); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.9; } }
  </style>

  <g class="fadeTitle">
    <text class="label-glow title" x="960" y="120" filter="url(#softglow1)">TRADE-OFF TRIANGLE</text>
    <text class="label title" x="960" y="120">TRADE-OFF TRIANGLE</text>
  </g>

  <g filter="url(#glow1)">
    <line class="glowedge draw1" x1="960" y1="250" x2="560" y2="830"/>
    <line class="edge draw1" x1="960" y1="250" x2="560" y2="830"/>
    <line class="glowedge draw2" x1="560" y1="830" x2="1360" y2="830"/>
    <line class="edge draw2" x1="560" y1="830" x2="1360" y2="830"/>
    <line class="glowedge draw3" x1="1360" y1="830" x2="960" y2="250"/>
    <line class="edge draw3" x1="1360" y1="830" x2="960" y2="250"/>
  </g>

  <g filter="url(#glow1)">
    <g class="nodeApex pulse">
      <circle class="node" cx="960" cy="250" r="14"/>
      <circle class="nodecore" cx="960" cy="250" r="5"/>
    </g>
    <g class="nodeLeft pulse">
      <circle class="node" cx="560" cy="830" r="14"/>
      <circle class="nodecore" cx="560" cy="830" r="5"/>
    </g>
    <g class="nodeRight pulse">
      <circle class="node" cx="1360" cy="830" r="14"/>
      <circle class="nodecore" cx="1360" cy="830" r="5"/>
    </g>
  </g>

  <g class="fadePerf">
    <text class="label-glow vlabel" x="960" y="205" filter="url(#softglow1)">PERFORMANCE</text>
    <text class="label vlabel" x="960" y="205">PERFORMANCE</text>
  </g>
  <g class="fadeSpeed">
    <text class="label-glow vlabel" x="520" y="900" filter="url(#softglow1)">SPEED</text>
    <text class="label vlabel" x="520" y="900">SPEED</text>
  </g>
  <g class="fadeCost">
    <text class="label-glow vlabel" x="1400" y="900" filter="url(#softglow1)">COST</text>
    <text class="label vlabel" x="1400" y="900">COST</text>
  </g>
</svg>
